name: Daily Supabase Storage backup

# Free Supabase Pro covers daily DB backups + 7-day PITR but does NOT cover
# Storage. This job mirrors every Storage bucket from prod into a Cloudflare
# R2 bucket once per day using rclone's incremental sync, so a Storage
# incident (or accidental delete) is recoverable to within ~24h.

on:
  schedule:
    # 06:00 UTC = 02:00 ET. Outside US peak so the I/O on the source bucket
    # doesn't compete with real traffic.
    - cron: '0 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone remotes
        env:
          SUPABASE_S3_ENDPOINT: ${{ secrets.SUPABASE_S3_ENDPOINT }}
          SUPABASE_S3_ACCESS_KEY: ${{ secrets.SUPABASE_S3_ACCESS_KEY }}
          SUPABASE_S3_SECRET_KEY: ${{ secrets.SUPABASE_S3_SECRET_KEY }}
          SUPABASE_S3_REGION: ${{ secrets.SUPABASE_S3_REGION }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          mkdir -p ~/.config/rclone
          cat <<EOF > ~/.config/rclone/rclone.conf
          [supabase]
          type = s3
          provider = Other
          access_key_id = $SUPABASE_S3_ACCESS_KEY
          secret_access_key = $SUPABASE_S3_SECRET_KEY
          endpoint = $SUPABASE_S3_ENDPOINT
          region = $SUPABASE_S3_REGION

          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = $R2_ACCESS_KEY_ID
          secret_access_key = $R2_SECRET_ACCESS_KEY
          endpoint = https://$R2_ACCOUNT_ID.r2.cloudflarestorage.com
          region = auto
          EOF

      - name: Sync avatars bucket
        env:
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          rclone sync supabase:avatars r2:$R2_BUCKET/avatars \
            --transfers=8 --checkers=16 --fast-list \
            --log-level INFO

      - name: Sync artwork-photos bucket
        env:
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          rclone sync supabase:artwork-photos r2:$R2_BUCKET/artwork-photos \
            --transfers=8 --checkers=16 --fast-list \
            --log-level INFO

      - name: Report stats
        env:
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          echo "Backup completed at $(date -u)"
          rclone size r2:$R2_BUCKET --json
